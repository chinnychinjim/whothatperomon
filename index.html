<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Boy Pokémon Invitation</title>
  <!-- Retro Pixel Font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Larger Game Boy Frame Container -->
  <div class="gb-screen">
    <div class="screen-content">
      
      <!-- Sparkle/Shine Effect Overlay -->
      <div class="flash-overlay" id="flashOverlay"></div>

      <!-- Scene Header -->
      <div class="scene">
        <div class="grass-line"></div>
        
        <!-- Larger Retro Pixelated Pokeball -->
        <div class="pokeball-wrapper" id="pokeballWrapper">
          <div class="pokeball" id="pokeball">
            <div class="pokeball-top"></div>
            <div class="pokeball-band"></div>
            <div class="pokeball-btn">
              <div class="pokeball-inner-btn" id="buttonInner"></div>
            </div>
            <div class="pokeball-bottom"></div>
          </div>
        </div>
      </div>

      <!-- Game Boy Dialogue Box -->
      <div class="dialog-box">
        <p id="dialogText">A WILD INVITATION APPEARED!</p>
        <span class="dialog-arrow">▼</span>
      </div>

    </div>
  </div>

  <!-- Invitation Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <button class="close-btn" id="closeBtn">[X]</button>
      <h2 class="modal-title">GOTCHA!</h2>
      
      <div class="invite-image-container">
        <!-- REPLACE 'src' WITH YOUR BASE64 STRING OR IMAGE PATH -->
        <img 
          src="https://picsum.photos/600/800" 
          alt="Event Invitation" 
          id="inviteImage"
        />
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
